# Deploy to:   Ubuntu 24.04 LTS — EC2 t4g.micro or local VM
# Apply:       docker compose -f docker-compose.prod.yml up -d
# Module:      file-transfer
# Requires:    configs/ssh/ host keys, configs/keys/ client public key
#
# Production compose for the file-transfer module.
# Parameters modified from baseline: restart, named volume for upload data, healthcheck

services:
  file-transfer:
    container_name: file-transfer
    image: atmoz/sftp:alpine
    platform: linux/amd64
    ports:
      - "2222:22"
    environment:
      - SFTP_USERS=labuser::1001::upload
    volumes:
      # Host keys — no :ro, entrypoint enforces chmod at startup
      - ./configs/ssh/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key
      - ./configs/ssh/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key
      # Client public key — read-only, no runtime writes needed
      - ./configs/keys/labuser_ed25519.pub:/home/labuser/.ssh/keys/labuser_ed25519.pub:ro
      # Upload data — named volume, survives container replacement
      - file-transfer-data:/home/labuser/upload
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - SYS_CHROOT
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 22 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  file-transfer-data: