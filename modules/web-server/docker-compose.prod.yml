# Deploy to:   Ubuntu 24.04 LTS — EC2 t4g.micro or local VM
# Apply:       docker compose -f docker-compose.prod.yml up -d
# Module:      web-server
# Requires:    none
#
# Production compose for the web-server module.
# Parameters modified from baseline: restart, read-only config mounts, healthcheck

services:
  web-server:
    image: nginxinc/nginx-unprivileged:stable-alpine
    container_name: web-server
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/html/index.html:/usr/share/nginx/html/index.html:ro
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp:uid=101,gid=101
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s