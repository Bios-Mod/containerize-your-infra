# Deploy to:   Ubuntu 24.04 LTS — EC2 t4g.micro or local VM
# Apply:       docker compose -f docker-compose.prod.yml up -d --build
# Module:      web-server
# Requires:    none
#
# Production compose for the web-server module.
# Parameters modified from baseline: restart, tmpfs, healthcheck

services:
  web-server:

    build:
      context: .
      dockerfile: Dockerfile
    image: web-server:local

    container_name: web-server

    restart: unless-stopped

    ports:
      - "8080:8080"
    
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp:uid=101,gid=101
    
    read_only: true

    cap_drop:
      - ALL
      
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s