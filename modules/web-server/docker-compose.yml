# Deploy to:   any host running Docker Engine (dev — OrbStack / prod — EC2 or local VM)
# Apply:       docker compose up -d
# Module:      web-server
# Requires:    none
#
# Nginx official image serving static content over HTTP (dev).
# Parameters modified from baseline: port mapping 8080:80, bind mounts, hardening constraints
#
# Purpose:     Static web server — lab index page
# Platform:    linux/amd64, linux/arm64

services:
  web-server:
    image: nginxinc/nginx-unprivileged:stable-alpine
    container_name: web-server
    ports:
      - "8080:80"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/html/index.html:/usr/share/nginx/html/index.html:ro
    tmpfs:
     - /var/cache/nginx:uid=101,gid=101
     - /var/run:uid=101,gid=101
     - /tmp:uid=101,gid=101
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped
