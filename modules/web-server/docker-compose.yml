# Deploy to:   modules/web-server/docker-compose.yml
# Apply:       docker compose build
#              docker compose up -d
# Module:      web-server
# Requires:    none
#
# Nginx official image serving static content over HTTP (dev).
# Parameters modified from baseline: port mapping 8080:8080, hardening constraints
#
# Purpose:     Static web server — lab index page
# Platform:    linux/amd64, linux/arm64

services:
  web-server:

    build:
      context: .
      dockerfile: Dockerfile
    
    image: web-server:local

    container_name: web-server

    ports:
      - "8080:8080"

    tmpfs:
     - /var/cache/nginx:uid=101,gid=101
     - /var/run:uid=101,gid=101
     - /tmp:uid=101,gid=101

    cap_drop:
      - ALL
    
    read_only: true

    restart: unless-stopped
