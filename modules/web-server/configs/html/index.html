<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>containerize-your-infra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    h1 { font-size: 1.4rem; color: #58a6ff; margin-bottom: 0.5rem; }
    .module { font-size: 0.95rem; color: #8b949e; margin-bottom: 1.5rem; }
    .status {
      display: inline-block;
      background: #1f6feb22;
      border: 1px solid #1f6feb;
      color: #58a6ff;
      border-radius: 4px;
      padding: 0.2rem 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .meta { font-size: 0.8rem; color: #6e7681; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>containerize-your-infra</h1>
    <div class="module">modules / web-server</div>
    <div class="status">● running</div>
    <div class="meta">
      Nginx · static · HTTP<br /><br />
      <a href="https://github.com/Bios-Mod/containerize-your-infra" target="_blank">
        github.com/Bios-Mod/containerize-your-infra
      </a>
    </div>
  </div>
</body>
</html>
