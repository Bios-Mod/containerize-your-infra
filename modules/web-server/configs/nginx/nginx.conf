# Deploy to:   inside container at /etc/nginx/nginx.conf
# Apply:       docker compose up -d (mounted read-only via bind mount)
# Module:      web-server
# Requires:    none
#
# Minimal Nginx config — single server block, logs to stdout/stderr
# Parameters modified from baseline: worker_processes auto, log paths to /dev/stdout

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Docker-native logging — captured by docker compose logs
    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}