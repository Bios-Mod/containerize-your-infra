# Deploy to:   Ubuntu 24.04 LTS — EC2 t4g.micro or local VM
# Apply:       docker compose -f docker-compose.prod.yml up -d
# Module:      reverse-proxy
# Requires:    configs/traefik/traefik.yml, configs/traefik/dynamic.yml, configs/traefik/certs/
#
# Production compose for the reverse-proxy module.
# Parameters modified from baseline: restart, api.insecure disabled, healthcheck

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./configs/traefik/certs:/etc/traefik/certs:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.middlewares=auth-dashboard@file"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy-net

  web-server:
    image: nginxinc/nginx-unprivileged:stable-alpine
    container_name: web-server
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-server.rule=Host(`web.localhost`)"
      - "traefik.http.routers.web-server.entrypoints=websecure"
      - "traefik.http.routers.web-server.tls=true"
      - "traefik.http.services.web-server.loadbalancer.server.port=8080"
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge
    name: proxy-net
    ipam:
      config:
        - subnet: 172.21.0.0/24